<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Senate | 3D Modeling Portfolio</title>

<!-- ============================================================= -->
<!--  FONTS                                                        -->
<!-- ============================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

<style>
/* =============================================================== */
/*  COLOR + THEME TOKENS. Tweak these to restyle the whole site.   */
/*  (CONFIG.theme further down can also override them from JS.)     */
/* =============================================================== */
:root{
  --red-base:   #2e050c;   /* page background, the dominant red    */
  --red-panel:  #440912;   /* closed dropdown / card fill          */
  --red-panel2: #380810;   /* open dropdown interior               */
  --red-brand:  #c01527;   /* vivid brand red, hero band, emphasis */
  --red-bright: #ff3b4b;   /* hover / highlight                    */
  --blue:       #2d7dff;   /* the blue outline on every dropdown   */
  --blue-glow:  rgba(45,125,255,.55);
  --violet:     #a578ff;   /* accent, links, badges, active        */
  --violet-2:   #7c3aed;
  --paper:      #fff4f4;   /* primary text                         */
  --paper-dim:  #eab7bd;   /* secondary text                       */
  --ink:        #16000a;   /* text on bright surfaces              */
  --line:       rgba(255,255,255,.10);
  --radius:     14px;
  --maxw:       1120px;
}

/* =============================================================== */
/*  BASE                                                           */
/* =============================================================== */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--red-base);
  color:var(--paper);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
/* subtle depth so the flat red reads as a surface, not a block */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(900px 500px at 82% -8%, rgba(192,21,39,.55), transparent 60%),
    radial-gradient(700px 600px at -10% 12%, rgba(124,58,237,.20), transparent 55%),
    radial-gradient(1200px 700px at 50% 120%, rgba(45,125,255,.10), transparent 60%);
}
main,header,footer{position:relative;z-index:1}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
::selection{background:var(--violet);color:#fff}

.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.mono{font-family:'JetBrains Mono',monospace;letter-spacing:.02em}

/* =============================================================== */
/*  TOP BAR                                                        */
/* =============================================================== */
.topbar{
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(10px);
  background:rgba(46,5,12,.72);
  border-bottom:1px solid var(--line);
}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:64px}
.brandmark{display:flex;align-items:center;gap:11px;font-family:'Sora';font-weight:800;font-size:1.05rem;letter-spacing:-.01em}
.brandmark .dot{width:12px;height:12px;border-radius:3px;background:var(--red-brand);box-shadow:0 0 0 2px var(--blue) inset, 0 0 14px var(--red-bright);transform:rotate(45deg)}
.topnav{display:flex;align-items:center;gap:22px}
.topnav a{font-size:.9rem;color:var(--paper-dim);font-weight:500;transition:color .2s}
.topnav a:hover{color:var(--paper)}
.badge{
  font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700;
  padding:6px 11px;border-radius:999px;text-transform:uppercase;letter-spacing:.08em;
  border:1.5px solid var(--violet);color:var(--violet);
  display:inline-flex;align-items:center;gap:7px;
}
.badge .live{width:7px;height:7px;border-radius:50%;background:var(--violet);box-shadow:0 0 8px var(--violet);animation:pulse 1.8s infinite}
.badge.closed{border-color:var(--paper-dim);color:var(--paper-dim)}
.badge.closed .live{background:var(--paper-dim);box-shadow:none;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.topnav .menu-links{display:flex;gap:22px}

/* =============================================================== */
/*  HERO                                                           */
/* =============================================================== */
.hero{padding:88px 0 64px}
.hero .eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:.78rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--violet);margin-bottom:22px;
  display:inline-flex;align-items:center;gap:12px;
}
.hero .eyebrow::before{content:"";width:34px;height:2px;background:var(--blue)}
.hero h1{
  font-family:'Sora';font-weight:800;letter-spacing:-.03em;line-height:1.02;
  font-size:clamp(2.6rem,7vw,5.4rem);
}
.hero h1 .accent{color:var(--red-brand);text-shadow:0 0 40px rgba(255,59,75,.35)}
.hero .lede{
  margin-top:26px;max-width:620px;font-size:1.14rem;color:var(--paper-dim);
}
.hero .lede strong{color:var(--paper);font-weight:600}
.cta-row{margin-top:36px;display:flex;flex-wrap:wrap;gap:14px}
.btn{
  font-weight:600;font-size:.96rem;padding:13px 22px;border-radius:11px;
  display:inline-flex;align-items:center;gap:9px;cursor:pointer;border:1.5px solid transparent;
  transition:transform .15s, box-shadow .2s, background .2s;
}
.btn.primary{background:var(--red-brand);color:#fff;box-shadow:0 8px 30px -8px rgba(192,21,39,.8)}
.btn.primary:hover{transform:translateY(-2px);box-shadow:0 12px 34px -8px rgba(255,59,75,.9);background:var(--red-bright)}
.btn.ghost{border-color:var(--blue);color:var(--paper)}
.btn.ghost:hover{background:rgba(45,125,255,.14);transform:translateY(-2px)}

/* discipline tags */
.taglist{margin-top:52px;display:flex;flex-wrap:wrap;gap:10px}
.taglist .t{
  font-family:'JetBrains Mono',monospace;font-size:.76rem;color:var(--paper-dim);
  padding:7px 13px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.02);
}
.taglist .t::before{content:"\25C6 ";color:var(--violet)}

/* stat strip */
.stats{margin-top:56px;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.stats .s{background:var(--red-panel);padding:22px 24px}
.stats .s .n{font-family:'Sora';font-weight:800;font-size:1.9rem;color:var(--paper)}
.stats .s .n .u{color:var(--violet);font-size:1.2rem}
.stats .s .l{font-family:'JetBrains Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--paper-dim);margin-top:4px}

/* =============================================================== */
/*  SECTION HEADING                                                */
/* =============================================================== */
.section{padding:60px 0}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:20px;margin-bottom:30px;flex-wrap:wrap}
.sec-head h2{font-family:'Sora';font-weight:800;font-size:clamp(1.7rem,3.4vw,2.5rem);letter-spacing:-.02em}
.sec-head h2 .hash{color:var(--blue);font-family:'JetBrains Mono';font-weight:700}
.sec-head p{color:var(--paper-dim);max-width:440px;font-size:.98rem}

/* =============================================================== */
/*  DROPDOWN / ACCORDION  (blue outline on every one)              */
/* =============================================================== */
.accordion{display:flex;flex-direction:column;gap:16px}
.drop{
  border:2px solid var(--blue);          /* the requested blue outline */
  border-radius:var(--radius);
  background:var(--red-panel);
  overflow:hidden;
  transition:box-shadow .25s, border-color .25s;
}
.drop.open{box-shadow:0 0 0 4px var(--blue-glow), 0 18px 40px -18px rgba(0,0,0,.7)}
.drop-head{
  width:100%;background:none;border:none;color:inherit;cursor:pointer;
  display:flex;align-items:center;gap:18px;padding:20px 22px;text-align:left;
  font-family:'Sora';transition:background .2s;
}
.drop-head:hover{background:rgba(45,125,255,.08)}
.drop-head:focus-visible{outline:3px solid var(--violet);outline-offset:-3px}
.drop-idx{
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.8rem;
  color:var(--ink);background:var(--blue);border-radius:7px;padding:6px 9px;flex-shrink:0;
}
.drop-title{font-weight:700;font-size:1.15rem;letter-spacing:-.01em;flex:1}
.drop-title .blurb{display:block;font-family:'Inter';font-weight:400;font-size:.85rem;color:var(--paper-dim);margin-top:2px}
.drop-count{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--violet);white-space:nowrap}
.chev{width:22px;height:22px;flex-shrink:0;transition:transform .3s;color:var(--blue)}
.drop.open .chev{transform:rotate(180deg);color:var(--violet)}

.drop-body{max-height:0;overflow:hidden;transition:max-height .38s cubic-bezier(.4,0,.2,1)}
.drop-inner{padding:6px 22px 26px;background:var(--red-panel2)}

/* thumbnail grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;padding-top:14px}
.card{
  position:relative;border:1px solid var(--line);border-radius:12px;overflow:hidden;
  cursor:zoom-in;background:#1a0209;
  transition:transform .18s, border-color .2s, box-shadow .2s;
  opacity:0;transform:translateY(10px);
}
.drop.open .card{opacity:1;transform:none}
.card:hover{transform:translateY(-4px);border-color:var(--violet);box-shadow:0 14px 30px -14px rgba(124,58,237,.6)}
.card .thumb{display:block;width:100%;aspect-ratio:4/3;object-fit:cover}
.card .cap{
  position:absolute;left:0;right:0;bottom:0;padding:30px 14px 12px;
  background:linear-gradient(to top, rgba(8,0,3,.9), rgba(8,0,3,.45) 55%, transparent);
  font-family:'Sora';font-weight:600;font-size:.92rem;letter-spacing:-.01em;color:#fff;
  opacity:0;transform:translateY(8px);transition:opacity .25s ease, transform .25s ease;
}
.card:hover .cap{opacity:1;transform:none}
.empty-note{color:var(--paper-dim);font-size:.9rem;padding:18px 4px;font-style:italic}

/* =============================================================== */
/*  PRICING                                                        */
/* =============================================================== */
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
.tier{
  border:2px solid var(--blue);border-radius:var(--radius);background:var(--red-panel);
  padding:26px 22px 24px;display:flex;flex-direction:column;position:relative;
  transition:transform .18s, box-shadow .2s;
}
.tier:hover{transform:translateY(-5px)}
.tier.featured{border-color:var(--violet);box-shadow:0 0 0 4px rgba(165,120,255,.22)}
.tier .flag{
  position:absolute;top:-11px;left:22px;background:var(--violet);color:#fff;
  font-family:'JetBrains Mono';font-size:.64rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;padding:4px 10px;border-radius:6px;
}
.tier h3{font-family:'Sora';font-weight:700;font-size:1.12rem}
.tier .price{font-family:'Sora';font-weight:800;font-size:2rem;line-height:1;margin:14px 0 6px;color:var(--paper)}
.tier .price .pre{display:block;font-family:'JetBrains Mono';font-size:.72rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--violet);margin-bottom:4px}
.tier .tblurb{color:var(--paper-dim);font-size:.88rem;margin-bottom:18px}
.tier ul{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:22px;flex:1}
.tier li{font-size:.89rem;display:flex;gap:9px;align-items:flex-start}
.tier li svg{width:16px;height:16px;color:var(--blue);flex-shrink:0;margin-top:3px}
.tier .btn{width:100%;justify-content:center;font-size:.9rem;padding:11px 18px}
.pricing-note{margin-top:24px;color:var(--paper-dim);font-size:.9rem;max-width:660px}
.pricing-note a{color:var(--violet);border-bottom:1px solid var(--violet)}

/* =============================================================== */
/*  CONTACT                                                        */
/* =============================================================== */
.contact{background:var(--red-brand);border-radius:24px;padding:clamp(32px,5vw,60px);margin:20px 0 0;position:relative;overflow:hidden}
.contact::after{content:"";position:absolute;inset:0;border-radius:24px;border:2px solid rgba(45,125,255,.4);pointer-events:none}
.contact h2{font-family:'Sora';font-weight:800;font-size:clamp(1.8rem,4vw,3rem);letter-spacing:-.02em;color:#fff}
.contact p{color:rgba(255,255,255,.85);max-width:520px;margin-top:14px;font-size:1.05rem}
.links{margin-top:30px;display:flex;flex-wrap:wrap;gap:12px}
.link{
  display:inline-flex;align-items:center;gap:9px;background:rgba(20,0,10,.35);
  border:1.5px solid rgba(255,255,255,.25);color:#fff;font-weight:600;font-size:.94rem;
  padding:12px 18px;border-radius:11px;transition:transform .15s, background .2s, border-color .2s;
}
.link:hover{transform:translateY(-2px);background:var(--violet);border-color:var(--violet)}
.link svg{width:18px;height:18px}
.contact-cta{
  display:inline-flex;align-items:center;gap:10px;margin-top:28px;
  background:#fff;color:var(--red-brand);font-weight:700;font-size:1rem;
  padding:15px 28px;border-radius:12px;border:1.5px solid #fff;
  transition:transform .15s, background .2s, color .2s, border-color .2s;
}
.contact-cta:hover{transform:translateY(-2px);background:var(--violet);color:#fff;border-color:var(--violet)}
.contact-cta svg{width:19px;height:19px}

/* =============================================================== */
/*  FOOTER                                                         */
/* =============================================================== */
footer{padding:44px 0 60px;text-align:center;color:var(--paper-dim);font-size:.85rem}
footer .mono{color:var(--paper-dim)}

/* =============================================================== */
/*  LIGHTBOX                                                       */
/* =============================================================== */
.lightbox{position:fixed;inset:0;z-index:100;background:rgba(10,0,4,.9);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:28px}
.lightbox.show{display:flex}
.lightbox figure{max-width:1000px;width:100%;text-align:center}
.lightbox img{width:100%;max-height:80vh;object-fit:contain;border:2px solid var(--blue);border-radius:14px;box-shadow:0 0 0 5px var(--blue-glow)}
.lightbox figcaption{margin-top:16px;font-family:'Sora';font-weight:600;font-size:1.1rem;color:#fff}
.lightbox figcaption span{display:block;font-family:'JetBrains Mono';font-weight:500;font-size:.8rem;color:var(--violet);margin-top:4px}
.lb-close{position:absolute;top:22px;right:26px;width:44px;height:44px;border-radius:50%;border:1.5px solid var(--blue);background:rgba(20,0,10,.6);color:#fff;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lb-close:hover{background:var(--red-brand)}

/* =============================================================== */
/*  LOADING SCREEN                                                 */
/* =============================================================== */
#loader{
  position:fixed;inset:0;z-index:9999;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(135% 135% at 50% 34%, #48091b 0%, #2a050b 56%, #1c0307 100%);
  transition:transform 1s cubic-bezier(.76,0,.24,1), opacity .8s ease .2s, visibility 1s;
}
#loader.hide{transform:translateY(-100%);opacity:0;visibility:hidden;pointer-events:none}
.load-aurora{
  position:absolute;inset:-10%;pointer-events:none;
  background:
    radial-gradient(38% 52% at 30% 32%, rgba(124,58,237,.32), transparent 62%),
    radial-gradient(42% 52% at 72% 64%, rgba(45,125,255,.24), transparent 62%),
    radial-gradient(52% 60% at 50% 92%, rgba(192,21,39,.40), transparent 62%);
  filter:blur(14px);
  animation:aurora 9s ease-in-out infinite alternate;
}
@keyframes aurora{0%{transform:translate3d(-2%,-1%,0) scale(1)}100%{transform:translate3d(2%,1.5%,0) scale(1.08)}}
#loader.hide .load-inner{opacity:0;transform:translateY(-6px);transition:opacity .35s ease, transform .35s ease}
.load-inner{
  position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:24px;
  animation:load-in .7s cubic-bezier(.2,.7,.2,1) both;
}
@keyframes load-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.load-badge{
  display:inline-flex;align-items:center;gap:10px;
  font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:500;
  letter-spacing:.3em;text-transform:uppercase;color:var(--paper-dim);
}
.load-diamond{
  width:9px;height:9px;background:var(--red-brand);transform:rotate(45deg);
  box-shadow:0 0 0 2px var(--blue) inset, 0 0 12px var(--red-bright);
  animation:diamond-pulse 1.7s ease-in-out infinite;
}
@keyframes diamond-pulse{0%,100%{opacity:.55;transform:rotate(45deg) scale(.82)}50%{opacity:1;transform:rotate(45deg) scale(1.06)}}
.load-mark{
  position:relative;
  font-family:'Sora',system-ui,sans-serif;font-weight:800;
  font-size:clamp(2.5rem,9vw,4.4rem);letter-spacing:-.015em;line-height:1;
}
.load-mark .lw{display:block}
.lw-outline{color:transparent;-webkit-text-stroke:1.3px rgba(45,125,255,.5)}
.lw-fill{
  position:absolute;left:0;top:0;
  color:var(--paper);-webkit-text-stroke:0;
  text-shadow:0 0 26px rgba(165,120,255,.35);
  clip-path:inset(100% 0 0 0);   /* JS drives this from the live load % */
}
.load-track{
  width:min(64vw,248px);height:3px;border-radius:2px;
  background:rgba(255,255,255,.12);overflow:hidden;position:relative;
}
.load-progress{
  position:absolute;left:0;top:0;height:100%;width:0%;border-radius:2px;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  box-shadow:0 0 12px rgba(165,120,255,.6);
}
.load-progress::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);
  transform:translateX(-100%);animation:bar-shine 1.5s ease-in-out infinite;
}
@keyframes bar-shine{0%{transform:translateX(-100%)}60%,100%{transform:translateX(220%)}}
.load-pct{
  font-family:'JetBrains Mono',monospace;font-weight:500;font-size:.78rem;
  letter-spacing:.18em;color:var(--paper-dim);
}
.load-pct span{color:var(--paper)}

/* =============================================================== */
/*  ENTRANCE ANIMATIONS                                            */
/* =============================================================== */
#top{transform:scale(.97);transform-origin:50% 32%;transition:transform 1.1s cubic-bezier(.2,.7,.2,1)}
body.loaded #top{transform:none}
.topbar{transform:translateY(-100%);transition:transform .8s cubic-bezier(.2,.75,.2,1)}
body.loaded .topbar{transform:none}
.hero-reveal{opacity:0;transform:translateY(24px);transition:opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1)}
.hero-reveal.is-in{opacity:1;transform:none}
.reveal{opacity:0;transform:translateY(30px);transition:opacity .85s cubic-bezier(.2,.7,.2,1), transform .85s cubic-bezier(.2,.7,.2,1)}
.reveal.is-in{opacity:1;transform:none}
.tier.reveal:nth-child(2){transition-delay:.1s}
.tier.reveal:nth-child(3){transition-delay:.2s}

/* =============================================================== */
/*  RESPONSIVE + MOTION                                            */
/* =============================================================== */
@media (max-width:720px){
  .topnav .menu-links{display:none}
  .stats{grid-template-columns:1fr}
  .hero{padding:60px 0 40px}
}
@media (prefers-reduced-motion:reduce){
  .load-aurora,.load-diamond,.load-progress::after{animation:none!important}
  #top{transform:none!important}
  #loader.hide{transform:none!important}
  .topbar{transform:none!important;transition:none!important}
  .hero-reveal,.reveal{transform:none!important}
}
</style>
</head>
<body>

<!-- LOADING SCREEN (shows first, fades out once the page is ready) -->
<div id="loader" aria-hidden="true">
  <div class="load-aurora"></div>
  <div class="load-inner">
    <span class="load-badge"><i class="load-diamond"></i>3D Modeling</span>
    <div class="load-mark">
      <span class="lw lw-outline">Senate</span>
      <span class="lw lw-fill" id="lwFill">Senate</span>
    </div>
    <div class="load-track"><span class="load-progress" id="loadProgress"></span></div>
    <div class="load-pct"><span id="loadPct">0</span>%</div>
  </div>
</div>

<!-- ============================================================= -->
<!--  Markup is generated from the CONFIG below. You normally      -->
<!--  never touch the HTML, only the CONFIG object.                -->
<!-- ============================================================= -->
<header class="topbar">
  <div class="wrap">
    <a class="brandmark" href="#top"><span class="dot"></span><span id="nav-name">Portfolio</span></a>
    <nav class="topnav">
      <div class="menu-links">
        <a href="#work">Work</a>
        <a href="#pricing">Pricing</a>
        <a href="#contact">Contact</a>
      </div>
      <span id="nav-badge"></span>
    </nav>
  </div>
</header>

<main id="top">
  <!-- HERO -->
  <section class="hero">
    <div class="wrap">
      <span class="eyebrow hero-reveal" id="hero-eyebrow">3D Modeling</span>
      <h1 class="hero-reveal" id="hero-title"></h1>
      <p class="lede hero-reveal" id="hero-lede"></p>
      <div class="cta-row hero-reveal">
        <a class="btn primary" href="#work">View the models</a>
        <a class="btn ghost" href="#pricing">See pricing</a>
      </div>
      <div class="taglist hero-reveal" id="hero-tags"></div>
      <div class="stats hero-reveal" id="hero-stats"></div>
    </div>
  </section>

  <!-- WORK / ACCORDION -->
  <section class="section" id="work">
    <div class="wrap">
      <div class="sec-head reveal">
        <h2><span class="hash">#</span> Things I've made</h2>
        <p id="work-blurb"></p>
      </div>
      <div class="accordion reveal" id="accordion"></div>
    </div>
  </section>

  <!-- PRICING -->
  <section class="section" id="pricing">
    <div class="wrap">
      <div class="sec-head reveal">
        <h2><span class="hash">#</span> Pricing</h2>
        <p id="pricing-intro"></p>
      </div>
      <div class="pricing-grid" id="pricing-grid"></div>
      <p class="pricing-note reveal" id="pricing-note"></p>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="section" id="contact">
    <div class="wrap">
      <div class="contact reveal">
        <h2 id="contact-title"></h2>
        <p id="contact-copy"></p>
        <a class="contact-cta" id="contact-cta" href="#" target="_blank" rel="noopener" style="display:none"></a>
        <div class="links" id="contact-links"></div>
      </div>
    </div>
  </section>
</main>

<footer>
  <div class="wrap">
    <p id="footer-line"></p>
    <p class="mono" style="margin-top:6px;font-size:.75rem">Static site, deploy ready for Vercel</p>
  </div>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" aria-hidden="true">
  <button class="lb-close" id="lb-close" aria-label="Close image">&#10005;</button>
  <figure>
    <img id="lb-img" src="" alt="" />
    <figcaption id="lb-cap"></figcaption>
  </figure>
</div>

<!-- ============================================================= -->
<!-- ============================================================= -->
<!--                                                               -->
<!--   >>>   THIS IS THE ONLY PART YOU EDIT   <<<                  -->
<!--                                                               -->
<!--   1. Fill in your details, links and prices.                  -->
<!--   2. Drop your PNG renders into the /Assets folder.           -->
<!--   3. List each model under the right section, pointing        -->
<!--      "image" at its file, e.g. "Assets/red-sword.png".        -->
<!--   4. Leave "image" blank ("") to auto-show a placeholder.     -->
<!--                                                               -->
<!-- ============================================================= -->
<!-- ============================================================= -->
<script>
const CONFIG = {

  /* ---- 1. WHO YOU ARE ---------------------------------------- */
  brand: {
    name:     "Senate",                           // shown top-left + footer
    role:     "3D Modeler for Roblox",            // the eyebrow line
    tagline:  "Game-ready 3D models,<br>built <span class='accent'>Roblox-first</span>.", // hero headline (HTML ok)
    lede:     "I model characters, weapons, vehicles and environments optimised for Roblox: clean topology, sensible tri-counts, and textures that read at any zoom. Everything below is my own work.", // hero paragraph
    footer:   "Thanks for stopping by."           // footer note
  },

  /* ---- 2. QUICK STATS (edit the numbers, or delete a row) ----- */
  stats: [
    { n: "40", u: "+", l: "models shipped" },
    { n: "5",  u: "yr", l: "modeling in Roblox" },
    { n: "24", u: "h", l: "avg. turnaround" }
  ],

  /* ---- 3. WHAT YOU MODEL (little tags under the hero) --------- */
  disciplines: ["Characters", "Weapons", "Vehicles", "Props", "Low-poly", "Stylized", "PBR textures"],

  /* ---- 4. YOUR MODELS ---------------------------------------- */
  /*  One "Models" dropdown. To add a piece, add a line to models: */
  /*     { title: "Name", image: "Assets/your-file.png" }          */
  /*  Add as many as you like; every image auto-fits the grid and  */
  /*  crops to fill neatly (no empty strip / chin). Title is        */
  /*  optional and only appears when you hover the image.           */
  sections: [
    {
      name: "Models",
      blurb: "A selection of pieces I've made.",
      models: [
        { title: "Leaking-pipe", image: "Assets/Leaking-pipe.png" },
        { title: "Pipe",          image: "Assets/Pipe.png" },
        { title: "Obstacle",         image: "Assets/Obstacle.png" },
        { title: "Sign",     image: "Assets/Sign.png" }
      ]
    }
  ],

  /* ---- 5. PRICING -------------------------------------------- */
  /*  Prices are starting points. Edit freely.                    */
  pricing: {
    intro: "Competitive rates for high quality, game-ready work. Every quote is fair for the detail involved, so you get clean, optimised models that hold up in-engine.",
    tiers: [
      {
        name: "Simple Build",
        price: "from $15",
        blurb: "Props, low-poly items and single objects.",
        features: ["1 game-ready model", "Basic texturing", "2 revisions", "~48h delivery"],
        featured: false
      },
      {
        name: "Detailed Build",
        price: "from $45",
        blurb: "Weapons, gear, detailed props and vehicles.",
        features: ["Clean topology", "Hand-painted or PBR textures", "3 revisions", "Optimised tri-count"],
        featured: true
      },
      {
        name: "Character / Rigged",
        price: "from $90",
        blurb: "Full characters, rigged and ready to animate.",
        features: ["Model, rig and skin weights", "PBR textures", "Roblox-ready export", "3 revisions"],
        featured: false
      }
    ],
    note: "Final price scales with complexity and reference detail. Bulk and repeat-client rates available. Message me on Discord for an exact quote.",
    cta: { label: "Get a quote", href: "https://discord.com/users/405794867155828746/" }
  },

  /* ---- 6. CONTACT -------------------------------------------- */
  contact: {
    commissionsOpen: true,              // flips the badge at top-right
    title: "Open for commissions.",
    copy:  "Tell me what you need modeled and roughly what it's for, and I'll come back with a quote and a timeline.",
    cta:   { label: "Contact me", href: "https://discord.com/users/405794867155828746/" }, // the button that opens your Discord
    links: [
      { label: "Discord: senate_2", href: "https://discord.com/users/405794867155828746/", icon: "discord" },
      { label: "Roblox profile",  href: "https://www.roblox.com/users/257767324/profile", icon: "roblox" }
      // delete any line you don't want, or add your own
    ]
  },

  /* ---- 7. THEME (optional colour overrides) ------------------ */
  theme: {
    "--red-base":  "#2e050c",
    "--red-brand": "#c01527",
    "--blue":      "#2d7dff",
    "--violet":    "#a578ff"
  }
};

/* =============================================================== */
/*  ENGINE. You do not need to edit anything below this line.      */
/* =============================================================== */
(function(){
  const $ = (s,el=document)=>el.querySelector(s);

  if(CONFIG.theme){for(const k in CONFIG.theme){document.documentElement.style.setProperty(k,CONFIG.theme[k]);}}

  // loading screen: determinate progress drives the word fill, the bar and the counter together
  (function(){
    const loader=document.getElementById('loader');
    if(!loader)return;
    if(CONFIG.brand&&CONFIG.brand.name){loader.querySelectorAll('.lw').forEach(el=>el.textContent=CONFIG.brand.name);}
    const fill=document.getElementById('lwFill');
    const bar=document.getElementById('loadProgress');
    const pctEl=document.getElementById('loadPct');
    let pct=0, loaded=false, done=false;
    const t0=Date.now();
    function render(p){
      if(pctEl)pctEl.textContent=Math.round(p);
      if(bar)bar.style.width=p+'%';
      if(fill)fill.style.clipPath='inset('+(100-p)+'% 0 0 0)';
    }
    function reveal(){
      document.body.classList.add('loaded');
      document.querySelectorAll('.hero-reveal').forEach((el,i)=>{el.style.transitionDelay=(i*95)+'ms';el.classList.add('is-in');});
      if('IntersectionObserver' in window){
        const io=new IntersectionObserver((ents,obs)=>{ents.forEach(e=>{if(e.isIntersecting){e.target.classList.add('is-in');obs.unobserve(e.target);}});},{threshold:.12,rootMargin:'0px 0px -6% 0px'});
        document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
      }else{
        document.querySelectorAll('.reveal').forEach(el=>el.classList.add('is-in'));
      }
    }
    function finish(){
      if(done)return;done=true;render(100);
      setTimeout(()=>{
        loader.classList.add('hide');
        reveal();
        setTimeout(()=>{if(loader.parentNode)loader.parentNode.removeChild(loader);},1100);
      },320);
    }
    window.addEventListener('load',()=>{loaded=true;});
    setTimeout(()=>{loaded=true;},5000); // fallback if load never fires
    const MIN=2000; // keep the loader on screen at least this long so the fill is fully seen
    (function tick(){
      if(done)return;
      const t=Date.now()-t0;
      const eased=100*(1-Math.pow(1-Math.min(1,t/MIN),2.2)); // smooth easeOut toward 100 across MIN ms
      const p=(loaded && t>=MIN) ? 100 : Math.min(96,eased);
      pct=p;render(pct);
      if(loaded && t>=MIN && pct>=100){finish();return;}
      requestAnimationFrame(tick);
    })();
  })();

  // placeholder image: an on-brand isometric-cube SVG with the title
  function placeholder(title){
    const t=(title||"").replace(/&/g,'&amp;').replace(/</g,'&lt;');
    const svg="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 300'>"
      +"<defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>"
      +"<stop offset='0' stop-color='#c01527'/><stop offset='1' stop-color='#3a0510'/></linearGradient></defs>"
      +"<rect width='400' height='300' fill='url(#g)'/>"
      +"<g fill='none' stroke='#a578ff' stroke-width='2.5' opacity='.9'>"
      +"<path d='M200 96 L262 132 L262 204 L200 240 L138 204 L138 132 Z'/>"
      +"<path d='M200 96 L200 168 M200 168 L262 132 M200 168 L138 132'/>"
      +"<path d='M200 168 L200 240' stroke='#2d7dff'/></g>"
      +"<rect x='14' y='14' width='372' height='272' fill='none' stroke='#2d7dff' stroke-width='2' rx='8' opacity='.5'/>"
      +"<text x='200' y='270' fill='#fff4f4' font-family='monospace' font-size='15' text-anchor='middle' opacity='.85'>"+t+"</text></svg>";
    return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);
  }

  const ICONS={
    discord:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4.5A18 18 0 0 0 15.5 3l-.3.5a13 13 0 0 1 3.9 1.9 12.5 12.5 0 0 0-10.2 0A13 13 0 0 1 12.8 3.5L12.5 3A18 18 0 0 0 8 4.5C4.8 9 4 13.2 4.3 17.4A18 18 0 0 0 9.5 20l.8-1.2a11 11 0 0 1-1.9-.9l.5-.4a9 9 0 0 0 8.2 0l.5.4c-.6.4-1.2.7-1.9.9L16.5 20a18 18 0 0 0 5.2-2.6c.4-4.9-.7-9-1.7-12.9ZM9.7 14.9c-.9 0-1.6-.8-1.6-1.8s.7-1.8 1.6-1.8 1.6.8 1.6 1.8-.7 1.8-1.6 1.8Zm4.6 0c-.9 0-1.6-.8-1.6-1.8s.7-1.8 1.6-1.8 1.6.8 1.6 1.8-.7 1.8-1.6 1.8Z"/></svg>',
    roblox:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 3 3 19l16 2 2-16L5 3Zm7.7 11.3-3.4-.4.4-3.4 3.4.4-.4 3.4Z"/></svg>',
    link:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>'
  };
  const icon=n=>ICONS[n]||ICONS.link;
  const check='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 12 4 4 10-10"/></svg>';

  // ---- brand / hero ----
  const b=CONFIG.brand;
  $('#nav-name').textContent=b.name;
  document.title=b.name+" | 3D Modeling Portfolio";
  $('#hero-eyebrow').innerHTML=b.role;
  $('#hero-title').innerHTML=b.tagline;
  $('#hero-lede').innerHTML=b.lede;
  $('#footer-line').textContent=b.footer+"   \u00A9 "+new Date().getFullYear()+" "+b.name;

  const open=CONFIG.contact.commissionsOpen;
  $('#nav-badge').innerHTML='<span class="badge '+(open?'':'closed')+'"><span class="live"></span>'+(open?'Open for work':'Currently closed')+'</span>';

  $('#hero-stats').innerHTML=(CONFIG.stats||[]).map(s=>
    '<div class="s"><div class="n">'+s.n+'<span class="u">'+(s.u||'')+'</span></div><div class="l">'+s.l+'</div></div>').join('');
  if(!CONFIG.stats||!CONFIG.stats.length)$('#hero-stats').style.display='none';

  $('#hero-tags').innerHTML=(CONFIG.disciplines||[]).map(t=>'<span class="t">'+t+'</span>').join('');
  $('#work-blurb').textContent="Open the dropdown, then click any image to view it full-size.";

  // ---- accordion ----
  const acc=$('#accordion');
  const multi=CONFIG.sections.length>1;
  acc.innerHTML=CONFIG.sections.map((sec,i)=>{
    const cards=(sec.models||[]).map(m=>{
      const src=m.image&&m.image.trim()?m.image:placeholder(m.title);
      const title=(m.title||'').replace(/"/g,'&quot;');
      return '<figure class="card" data-full="'+src+'" data-title="'+title+'" data-sub="'+sec.name+'">'
        +'<img class="thumb" loading="lazy" src="'+src+'" alt="'+(m.title||'model')+'">'
        +(m.title?'<figcaption class="cap">'+m.title+'</figcaption>':'')
        +'</figure>';
    }).join('');
    const body=(sec.models&&sec.models.length)
      ? '<div class="grid">'+cards+'</div>'
      : '<p class="empty-note">No models here yet. Add some in the CONFIG.</p>';
    return '<div class="drop" data-i="'+i+'">'
      +'<button class="drop-head" aria-expanded="false" aria-controls="body-'+i+'">'
      +(multi?'<span class="drop-idx">'+String(i+1).padStart(2,'0')+'</span>':'')
      +'<span class="drop-title">'+sec.name+(sec.blurb?'<span class="blurb">'+sec.blurb+'</span>':'')+'</span>'
      +'<span class="drop-count">'+(sec.models||[]).length+' model'+((sec.models||[]).length===1?'':'s')+'</span>'
      +'<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>'
      +'</button><div class="drop-body" id="body-'+i+'"><div class="drop-inner">'+body+'</div></div></div>';
  }).join('');

  acc.querySelectorAll('.drop').forEach(drop=>{
    const head=drop.querySelector('.drop-head');
    const body=drop.querySelector('.drop-body');
    head.addEventListener('click',()=>{
      if(drop.classList.contains('open')){
        drop.classList.remove('open');head.setAttribute('aria-expanded','false');body.style.maxHeight=null;
      }else{
        drop.classList.add('open');head.setAttribute('aria-expanded','true');
        body.style.maxHeight=body.scrollHeight+'px';
        setTimeout(()=>{if(drop.classList.contains('open'))body.style.maxHeight=body.scrollHeight+40+'px';},400);
      }
    });
  });
  const first=acc.querySelector('.drop');
  if(first){first.querySelector('.drop-head').click();}

  // ---- pricing ----
  const P=CONFIG.pricing;
  if(P){
    $('#pricing-intro').textContent=P.intro||'';
    $('#pricing-grid').innerHTML=(P.tiers||[]).map(t=>{
      const pm=(t.price||'').match(/^(from\s+)?(.*)$/i);
      const pre=pm&&pm[1]?'<span class="pre">'+pm[1].trim()+'</span>':'';
      const amount=pm?pm[2]:(t.price||'');
      const feats=(t.features||[]).map(f=>'<li>'+check+'<span>'+f+'</span></li>').join('');
      const href=(P.cta&&P.cta.href)?P.cta.href:'#contact';
      const label=(P.cta&&P.cta.label)?P.cta.label:'Get a quote';
      return '<div class="tier reveal'+(t.featured?' featured':'')+'">'
        +(t.featured?'<span class="flag">Most popular</span>':'')
        +'<h3>'+t.name+'</h3>'
        +'<div class="price">'+pre+amount+'</div>'
        +(t.blurb?'<div class="tblurb">'+t.blurb+'</div>':'')
        +'<ul>'+feats+'</ul>'
        +'<a class="btn '+(t.featured?'primary':'ghost')+'" href="'+href+'" target="_blank" rel="noopener">'+label+'</a>'
        +'</div>';
    }).join('');
    if(P.note){
      const linkHref=(P.cta&&P.cta.href)?P.cta.href:'#contact';
      $('#pricing-note').innerHTML=P.note.replace(/Discord/,'<a href="'+linkHref+'" target="_blank" rel="noopener">Discord</a>');
    }
  }

  // ---- contact ----
  $('#contact-title').textContent=CONFIG.contact.title;
  $('#contact-copy').textContent=CONFIG.contact.copy;
  if(CONFIG.contact.cta&&CONFIG.contact.cta.href){
    const cc=$('#contact-cta');
    cc.href=CONFIG.contact.cta.href;
    cc.innerHTML=icon('discord')+'<span>'+(CONFIG.contact.cta.label||'Contact me')+'</span>';
    cc.style.display='inline-flex';
  }
  $('#contact-links').innerHTML=CONFIG.contact.links.map(l=>
    '<a class="link" href="'+l.href+'"'+(l.href.startsWith('http')?' target="_blank" rel="noopener"':'')+'>'+icon(l.icon)+'<span>'+l.label+'</span></a>').join('');

  // ---- lightbox ----
  const lb=$('#lightbox'),lbImg=$('#lb-img'),lbCap=$('#lb-cap');
  function openLB(src,title,sub){lbImg.src=src;lbImg.alt=title;lbCap.innerHTML=title+'<span>'+sub+'</span>';lb.classList.add('show');lb.setAttribute('aria-hidden','false');}
  function closeLB(){lb.classList.remove('show');lb.setAttribute('aria-hidden','true');lbImg.src='';}
  acc.addEventListener('click',e=>{const c=e.target.closest('.card');if(c)openLB(c.dataset.full,c.dataset.title,c.dataset.sub);});
  $('#lb-close').addEventListener('click',closeLB);
  lb.addEventListener('click',e=>{if(e.target===lb)closeLB();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB();});
})();
</script>
</body>
</html>
